<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1B2D5E" />
<title>Offline — PortePortal</title>
<link rel="icon" type="image/png" href="assets/logo-porteportal.png" />
<style>
  :root{
    --navy:#1B2D5E; --lime:#78B51A; --bg:#F4F4F4; --line:#E3E6EC; --muted:#5C6478;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:-apple-system, system-ui, Segoe UI, Roboto, sans-serif;
    background:var(--bg); color:#1A1A1A;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .card{
    background:#fff;border:1px solid var(--line);border-radius:24px;
    padding:40px 32px;text-align:center;max-width:440px;width:100%;
    box-shadow: 0 24px 48px rgba(14,24,50,.08);
  }
  img{width:96px;height:96px;border-radius:20px;margin:0 auto 20px;display:block}
  h1{margin:0 0 8px;font-size:24px;font-weight:700;color:var(--navy);letter-spacing:-.01em}
  p{margin:0 0 24px;color:var(--muted);font-size:15px;line-height:1.55}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:12px 22px;border-radius:999px;
    background:var(--navy);color:#fff !important;text-decoration:none;
    font-weight:600;font-size:14.5px;
  }
  .btn:hover{background:#162548}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--lime);
       box-shadow:0 0 0 4px rgba(120,181,26,.18);margin-right:8px;vertical-align:middle}
  .small{font-size:12.5px;color:var(--muted);margin-top:18px}
</style>
</head>
<body>
  <div class="card">
    <img src="assets/logo-porteportal.png" alt="PortePortal" />
    <h1><span class="dot"></span>Offline</h1>
    <p>
      Sie sind gerade offline. Bereits geöffnete Tools funktionieren weiterhin —
      die Daten synchronisieren sich, sobald wieder Empfang da ist.
    </p>
    <a href="./" class="btn">Erneut versuchen</a>
    <div class="small">PortePortal · Union E GmbH</div>
  </div>
</body>
</html>
